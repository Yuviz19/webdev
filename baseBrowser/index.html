<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Base Brower</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
    <script src="script.js"></script>
    <div class="searchbar">
        <form action="" id="search_form">
            <input type="text" id="urlInput" placeholder="Enter Query...">
            <button type="submit" id="search">Go!</button>
        </form>
    </div>
    <div id="tabs_container">
        <button id="add_tab">+ Add Tab</button>
    </div>
    <div class="buttons">
        <button id="back">&larr;</button>
        <button id="forward">&rarr;</button>
    </div>
    <div id="result">
        <iframe id="viewer" src="" frameborder="1" width="100%" height="600"></iframe>
    </div>
</body>
</html>
