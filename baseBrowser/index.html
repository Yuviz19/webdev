<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Base Brower</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
    <script src="script.js"></script>
    <div class="searchbar">
        <form action="" id="search_form">

        </form>
    </div>
    <div id="result">
        <iframe width="100%" height="500" id="viewer" frameborder="1"></iframe>
    </div>
</body>
</html>
